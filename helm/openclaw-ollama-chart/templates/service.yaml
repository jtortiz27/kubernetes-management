apiVersion: v1
kind: Service
metadata:
  name: {{ include "openclaw-ollama.fullname" . }}
  labels:
    app: {{ include "openclaw-ollama.fullname" . }}
spec:
  type: {{ .Values.service.type }}
  selector:
    app: {{ include "openclaw-ollama.fullname" . }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.openclaw.containerPort }}
      {{- if eq .Values.service.type "NodePort" }}
      nodePort: {{ .Values.service.nodePort }}
      {{- end }}