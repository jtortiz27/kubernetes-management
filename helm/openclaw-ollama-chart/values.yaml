replicaCount: 1

nameOverride: ""
fullnameOverride: ""

openclaw:
  image:
    repository: ghcr.io/openclaw/openclaw
    tag: "2026.3.2"
    pullPolicy: Always
  containerPort: 18789
  command: [ "/bin/sh","-lc" ]
  args:
      - |
        echo "Waiting for Ollama /api/tags...";
        node -e '
          const u="http://127.0.0.1:11434/api/tags";
          (async()=> {
            for(;;){
              try{
                const r = await fetch(u);
                if (r.ok) { console.log("Ollama ready"); process.exit(0); }
              } catch(e) {}
              await new Promise(r=>setTimeout(r,500));
            }
          })();
        ';
        exec node openclaw.mjs gateway --allow-unconfigured --bind=lan --raw-stream --raw-stream-path=/tmp/openclaw/raw-stream.jsonl
  env:
    GATEWAY_TOKEN: "localdevtoken"
    OLLAMA_BASE_URL: "http://127.0.0.1:11434"
    OLLAMA_API_KEY: "ollama-local"
    OLLAMA_KEEP_ALIVE: "-1"
    NODE_OPTIONS: "--dns-result-order=ipv4first"

    # OTEL exporter env overrides:
    OTEL_EXPORTER_OTLP_ENDPOINT: "http://localhost:4318"
    OTEL_EXPORTER_OTLP_PROTOCOL: "http/protobuf"
    OTEL_SERVICE_NAME: "openclaw-gateway"
  resources:
    requests:
      cpu: "0.5"
      memory: "1Gi"
    limits:
      cpu: "2"
      memory: "2Gi"

ollama:
  image:
    repository: ollama/ollama
    tag: latest
    pullPolicy: IfNotPresent
  containerPort: 11434
  modelsPath: "/root/.ollama"
  env:
    OLLAMA_KEEP_ALIVE: "-1"
    OLLAMA_LOAD_TIMEOUT: "15m"
    OLLAMA_NUM_PARALLEL: "1"
    OLLAMA_MAX_QUEUE: "512"
    OLLAMA_CONTEXT_LENGTH: "4096"
  resources:
    requests:
      cpu: "2"
      memory: "8Gi"
    limits:
      cpu: "6"
      memory: "10Gi"
# Models to pre-pull at pod start
prepull:
  enabled: true
  models:
    - "qwen2.5:7b"

service:
  type: NodePort
  port: 18789
  nodePort: 31889

# Storage for Ollama models:
# - emptyDir is simplest (models disappear when pod is deleted)
# - set enabled=true and provide a PVC name to persist
persistence:
  enabled: true
  existingClaim: ""
  accessModes:
    - ReadWriteOnce
  storageClassName: ""
  size: 80Gi

# NEW (OpenClaw config + token + UI settings)
openclawConfigPersistence:
  enabled: true
  existingClaim: ""
  accessModes:
    - ReadWriteOnce
  storageClassName: ""
  size: 5Gi
  mountPath: /home/node/.openclaw

observability:
  enabled: true

  otel:
    endpoint: "http://localhost:4318"
    protocol: "http/protobuf"
    serviceName: "openclaw-gateway"
    traces: true
    metrics: true
    logs: false   # start false; logs can be noisy
    sampleRate: 1
    flushIntervalMs: 10000

  collector:
    image: "otel/opentelemetry-collector:0.95.0"
    otlpHttpPort: 4318
    prometheusPort: 9464

metrics:
  enabled: true
  path: /metrics
  port: 9464