name: Validation Crucible

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  diagnostic:
    name: Diagnostic info
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Environment info
        run: |
          set -x
          uname -a > /tmp/diag.txt || true
          id >> /tmp/diag.txt || true
          echo PATH=$PATH >> /tmp/diag.txt || true
          env >> /tmp/diag.txt || true
          df -h >> /tmp/diag.txt || true
          curl --version >> /tmp/diag.txt || true
          curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | sed -n '1,80p' > /tmp/helm-get-head.sh || true
      - name: Upload diagnostic artifact
        uses: actions/upload-artifact@v4
        with:
          name: diagnostic
          path: |
            /tmp/diag.txt
            /tmp/helm-get-head.sh

  helm-validate:
    name: Helm chart validation
    runs-on: ubuntu-latest
    needs: diagnostic
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Helm (script)
        run: |
          set -x
          curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
          helm version || true

      - name: Helm lint
        run: |
          set -x
          cd helm/openclaw-ollama-chart
          helm lint . || true

      - name: Render templates
        run: |
          helm template openclaw-crucible ./helm/openclaw-ollama-chart > /tmp/rendered-manifests.yaml || true

      - name: Upload rendered manifests artifact
        uses: actions/upload-artifact@v4
        with:
          name: rendered-manifests
          path: /tmp/rendered-manifests.yaml

      - name: Optional: run helm tests (if any)
        if: false
        run: |
          echo "No tests configured"

  quick-worker-render:
    name: Worker template smoke test
    runs-on: ubuntu-latest
    needs: diagnostic
    steps:
      - uses: actions/checkout@v4
      - name: Install Helm (script)
        run: |
          curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
      - name: Render worker test
        run: |
          helm template openclaw-worker-test ./helm/openclaw-ollama-chart --set workers.example.image=alpine --set workers.example.job=true > /tmp/worker-render.yaml || true
      - name: Upload worker render artifact
        uses: actions/upload-artifact@v4
        with:
          name: worker-render
          path: /tmp/worker-render.yaml
